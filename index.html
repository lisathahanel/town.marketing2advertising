/* MENU */
.menu-bar {
  position: sticky;
  buttom: 0;
  width: 70%;
  max-width: 1000px;
  margin: 0 auto 20px;
  background: #fff;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
  padding: 10px 0;
  border-radius: 0 0 12px 12px;
  z-index: 9999;
  transition: background 0.3s, color 0.3s;
}

.menu-bar a {
  font-family: Georgia, serif;
  font-weight: 700;
  padding: 8px 14px;
  text-decoration: none;
  text-transform: uppercase;
  font-size: 18px;
  border-radius: 6px;

.menu-home { background: #04ff00; color: #ff00fe; }
.menu-movies { background: #3d85c6; color: #ffa400; }
.menu-blogs { background: #fcff01; color: #351c75; }

.menu-contact { background: #4c1130; color: #fcff01; }
.menu-jobs { background: #ff00fe; color: #04ff00; }

@media(max-width:600px){
  .menu-bar { width: 95% }
  .menu-bar a { font-size: 15px; padding: 6px 10px }
}


  
/* BLOG POST CONTENT */
.content {
  max-width: 900px;
  margin: 20px auto;
  padding: 0 15px;
}

.content h1, .content h2 {
  text-align: center;

}

.content p {

}

.separator {

}

.separator img {

/* SEARCH BOX */
.search-bar-wrapper {
  max-width: 600px;
  margin: 40px auto 20px;
  display: flex;
  justify-content: center;
  gap: 10px;
}

.search-bar-wrapper input {
  width: 100%;
  padding: 16px 20px;
  border-radius: 50px;
  border: 2px solid #fcff01;
  background: #111;
  color: #fff;
  font-size: 18px;
  outline: none;
  transition: all 0.3s ease;
}

.search-bar-wrapper input:focus {
  border-color: #e50914;
  box-shadow: 0 0 10px #e50914;
}

.search-bar-wrapper button {
  background: #e50914;
  color: #fff;
  border: none;
  border-radius: 50%;
  width: 55px;
  height: 55px;
  font-size: 22px;
  cursor: pointer;
  transition: transform 0.3s ease, background 0.3s ease;
}

.search-bar-wrapper button:hover {
  transform: scale(1.1);
  background: #b00610;
}

/* SEARCH RESULTS */
.search-results {
  max-width: 1000px;
  margin: 20px auto;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 20px;
}

.result-card {
  background: #111;
  border-radius: 8px;
  overflow: hidden;
  text-align: center;
  box-shadow: 0 5px 15px rgba(0,0,0,0.6);
  transition: transform 0.3s ease;
}

.result-card:hover {
  transform: scale(1.05);
}

.result-card img {
  width: 100%;
  height: 250px;
  object-fit: cover;
}

.result-title {
  background: #e50914;
  padding: 10px;
  font-weight: bold;
  text-transform: capitalize;
  font-size: 15px;
}

/* MOVIE GRID */
.movie-grid-wrapper {
  max-width: 1200px;
  margin: 40px auto;
  padding: 0 20px;
}

.grid-title {
  text-align: center;
  font-size: 26px;
  margin-bottom: 25px;
  color: #fcff01;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.movie-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 20px;
}

.movie-card {
  background: #111;
  border-radius: 8px;
  overflow: hidden;
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.8);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.movie-card:hover {
  transform: scale(1.05);
  box-shadow: 0 10px 25px rgba(229, 9, 20, 0.7);
}

.poster {
  position: relative;
  aspect-ratio: 2/3;
  overflow: hidden;
}

.movie-card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.3s ease, filter 0.3s ease;
}

.movie-card:hover img {
  filter: brightness(0.6);
  transform: scale(1.1);
}

.play-button {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 45px;
  color: white;
  background: rgba(229, 9, 20, 0.9);
  border-radius: 50%;
  width: 65px;
  height: 65px;
  text-align: center;
  line-height: 65px;
  box-shadow: 0 0 20px #e50914;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s ease;
}

.movie-card:hover .play-button {
  opacity: 1;
}

.movie-title {
  text-align: center;
  background: #e50914;
  color: white;
  padding: 10px;
  font-size: 15px;
  font-weight: bold;
  text-transform: capitalize;

  display: flex;
  align-items: center;
  justify-content: center;

<script>
// DARK/LIGHT MODE
const toggleBtn = document.getElementById('modeToggle');
toggleBtn.addEventListener('click', () => {
  document.body.classList.toggle('light-mode');
});

// BLOGGER SEARCH
const BLOG_URL = "https://www.marketing2advertising.com/";

function searchPosts(query) {
  if (!query) return;
  const script = document.createElement("script");
  script.src = `${BLOG_URL}/feeds/posts/default?alt=json-in-script&q=${encodeURIComponent(query)}&max-results=30&callback=showSearchResults`;
  document.body.appendChild(script);
}

function showSearchResults(json) {
  const container = document.getElementById("searchResults");
  container.innerHTML = "";
  if (!json.feed || !json.feed.entry) {
    container.innerHTML = `<p style="text-align:center;color:#aaa;">No results found.</p>`;
    return;
  }
  let html = "";
  json.feed.entry.forEach(entry => {
    const title = entry.title.$t;
    let url = "";
    let img = "https://via.placeholder.com/300x450?text=No+Image";
    entry.link.forEach(l => { if(l.rel==="alternate") url=l.href; });
    if(entry.media$thumbnail) img = entry.media$thumbnail.url.replace("/s72-c/", "/s400/");
    else if(entry.content) {
      const match = entry.content.$t.match(/<img[^>]+src="([^">]+)"/);
      if(match) img = match[1];
    }
    html += `<div class="result-card">
      <a href="${url}" target="_blank" rel="noopener noreferrer">
        <img src="${img}" alt="${title}">
        <div class="result-title">${title}</div>
      </a>
    </div>`;
  });
  container.innerHTML = html;
}

document.getElementById("searchBtn").addEventListener("click", () => {
  const query = document.getElementById("searchInput").value.trim();
  searchPosts(query);
});

document.getElementById("searchInput").addEventListener("keypress", (e) => {
  if (e.key === "Enter") document.getElementById("searchBtn").click();
});

// MOVIE GRID
function renderMovieSlider(json) {
  const postsContainer = document.getElementById('movie-grid');
  let postsHTML = '';
  const maxPosts = 50;
  for(let i=0;i<Math.min(json.feed.entry.length,maxPosts);i++){
    const entry=json.feed.entry[i];
    const title=entry.title.$t;
    let url='';
    for(let j=0;j<entry.link.length;j++){if(entry.link[j].rel==='alternate'){url=entry.link[j].href;break;}}
    let imgUrl='https://via.placeholder.com/300x450?text=No+Image';
    if(entry.media$thumbnail) imgUrl=entry.media$thumbnail.url.replace('/s72-c/','/s640/');
    else if(entry.content){const match=entry.content.$t.match(/<img[^>]+src="([^">]+)"/); if(match && match[1]) imgUrl=match[1];}
    postsHTML+=`<div class="movie-card"><a href="${url}" title="${title}" target="_blank" rel="noopener noreferrer"><div class="poster"><img src="${imgUrl}" alt="${title}"><div class="play-button">&#9658;</div></div><div class="movie-title">${title}</div></a></div>`;
  }
  postsContainer.innerHTML = postsHTML;
}

// ==== LOAD BLOGGER FEED ====
var s = document.createElement("script");
s.src = "https://www.marketing2advertising.com/feeds/pages/default?alt=json-in-script&max-results=100&callback=feed";
document.body.appendChild(s);
</script>
